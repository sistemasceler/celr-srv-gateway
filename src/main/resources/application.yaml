# ==============================================================
# celr-srv-gateway — configuração de referência
# ==============================================================

spring:
  application:
    name: celr-srv-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:1s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:32}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: ${REDIS_POOL_MAX_WAIT:500ms}

  cloud:
    gateway:
      # ----------------------------------------------------------------
      # Filtros globais — ordem é contrato:
      #  1. CorrelationIdFilter          → X-Correlation-Id garantido para todos os logs
      #  2. ResolverCanalFilter          → detecta canal via Host antes da autenticação
      #  3. AutenticacaoFilter           → chama autorizador corporativo; valida token, permissões e popula contexto
      #  4. InjetarContextoFilter        → escreve headers internos a partir do SecurityContext
      #  5. AuditoriaFilter              → lê contexto já populado; registra entrada e saída
      # ----------------------------------------------------------------
      server:
        webflux:
          default-filters:
            - name: RemoverHeadersClienteFilter
            - name: CorrelationIdFilter
            - name: ResolverCanalFilter
            - name: AutenticacaoFilter
            - name: InjetarContextoFilter
            - name: AuditoriaFilter
          httpclient:
            connect-timeout: ${GATEWAY_HTTP_CONNECT_TIMEOUT_MS:2000}
            response-timeout: ${GATEWAY_HTTP_RESPONSE_TIMEOUT:10s}
            pool:
              max-connections: ${GATEWAY_HTTP_MAX_CONNECTIONS:500}
              type: FIXED
              max-idle-time: ${GATEWAY_HTTP_MAX_IDLE_TIME:30s}
              acquire-timeout: ${GATEWAY_HTTP_ACQUIRE_TIMEOUT_MS:3000}
            ssl:
              use-insecure-trust-manager: false
          routes:

            # ==============================================================
                    # AUTENTICAÇÃO — ÁREA PÚBLICA
                    # ==============================================================

                    - id: celr-autenticacao-login
                      uri: ${CELR_SRV_AUTENTICACAO_URL:http://localhost:8082}
                      predicates:
                        - Path=/v1/autenticacao/login
                        - Method=POST
                      filters:
                        # key-resolver via SpEL é suportado oficialmente.
                        # replenishRate e burstCapacity são numéricos diretos — sem SpEL.
                        # O CelerRateLimiter lê o perfil correto via metadados da rota.
                        - name: RequestRateLimiter
                          args:
                            rate-limiter: "#{@celerRateLimiter}"
                            key-resolver: "#{@ipKeyResolver}"
                        - name: CircuitBreaker
                          args:
                            name: celr-autenticacao
                            fallbackUri: forward:/fallback/autenticacao
                      metadata:
                        politica-acesso: PUBLICA
                        canal-origem-obrigatorio: false
                        auditoria: true
                        rota-publica: true
                        perfil-rate-limit: autenticacao-login

                    - id: celr-autenticacao-renovar
                      uri: ${CELR_SRV_AUTENTICACAO_URL:http://localhost:8082}
                      predicates:
                        - Path=/v1/autenticacao/renovar
                        - Method=POST
                      filters:
                        - name: RequestRateLimiter
                          args:
                            rate-limiter: "#{@celerRateLimiter}"
                            key-resolver: "#{@ipKeyResolver}"
                        - name: CircuitBreaker
                          args:
                            name: celr-autenticacao
                            fallbackUri: forward:/fallback/autenticacao
                      metadata:
                        politica-acesso: PUBLICA
                        canal-origem-obrigatorio: false
                        auditoria: true
                        rota-publica: true
                        perfil-rate-limit: autenticacao-renovar

                    - id: celr-autenticacao-esqueci-senha
                      uri: ${CELR_SRV_AUTENTICACAO_URL:http://localhost:8082}
                      predicates:
                        - Path=/v1/autenticacao/esqueci-senha
                        - Method=POST
                      filters:
                        - name: RequestRateLimiter
                          args:
                            rate-limiter: "#{@celerRateLimiter}"
                            key-resolver: "#{@ipKeyResolver}"
                        - name: CircuitBreaker
                          args:
                            name: celr-autenticacao
                            fallbackUri: forward:/fallback/autenticacao
                      metadata:
                        politica-acesso: PUBLICA
                        canal-origem-obrigatorio: false
                        auditoria: true
                        rota-publica: true
                        perfil-rate-limit: autenticacao-esqueci-senha

                    # ==============================================================
                    # SERP — PEDIDOS
                    # ==============================================================

                    - id: serp-pedidos-consultar
                      uri: ${SERP_BFF_URL:http://localhost:8081}
                      predicates:
                        - Path=/serp/pedidos/**
                        - Method=GET
                      filters:
                        - name: RequestRateLimiter
                          args:
                            rate-limiter: "#{@celerRateLimiter}"
                            key-resolver: "#{@usuarioKeyResolver}"
                        - name: CircuitBreaker
                          args:
                            name: serp-bff
                            fallbackUri: forward:/fallback/serp
                      metadata:
                        politica-acesso: AUTENTICADA
                        canal-esperado: SERP
                        canal-origem-obrigatorio: true
                        validar-canal-token: true
                        permissoes-requeridas:
                          - pedido:ler
                        auditoria: true
                        perfil-rate-limit: padrao

                    - id: serp-pedidos-criar
                      uri: ${SERP_BFF_URL:http://localhost:8081}
                      predicates:
                        - Path=/serp/pedidos
                        - Method=POST
                      filters:
                        - name: RequestRateLimiter
                          args:
                            rate-limiter: "#{@celerRateLimiter}"
                            key-resolver: "#{@usuarioKeyResolver}"
                        - name: CircuitBreaker
                          args:
                            name: serp-bff
                            fallbackUri: forward:/fallback/serp
                      metadata:
                        politica-acesso: AUTENTICADA
                        canal-esperado: SERP
                        canal-origem-obrigatorio: true
                        validar-canal-token: true
                        permissoes-requeridas:
                          - pedido:criar
                        auditoria: true
                        perfil-rate-limit: escrita
          metrics:
            enabled: true

# ==============================================================
# SERVIDOR
# ==============================================================

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  netty:
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT_MS:5000}
    idle-timeout: ${SERVER_IDLE_TIMEOUT:60s}

# ==============================================================
# DOMÍNIO CELER
# ==============================================================

celer:
  gateway:

    seguranca:
      remover-headers-cliente-sensiveis: true
      bloquear-header-contexto-forjado: true
      validar-origem-canal: true
      propagar-correlation-id: true

    autenticacao:
      url: ${CELR_SRV_AUTENTICACAO_URL:http://localhost:8082}
      timeout: ${AUTH_SERVICE_TIMEOUT:3s}
      # fail-closed: se o serviço de auth estiver indisponível, bloqueia a requisição.
      # Nunca altere para false em produção.
      fail-closed: true
      cache-local:
        habilitado: true
        ttl: ${AUTH_CACHE_TTL:30s}
        capacidade-maxima: ${AUTH_CACHE_CAPACIDADE:10000}

    canais:
      # Fonte única de verdade para resolução de canal a partir do Host.
      hosts:
        "erp.celer.com.br": SERP
        "www.encomendar.online": SECO
        "pdvl.celer.com.br": PDVL
        "pdvc.celer.com.br": PDVC

    headers-internos:
      # Filtros referenciam estas chaves — nunca hardcode de string nos filtros.
      usuario-id: X-Usuario-Id
      unidade-id: X-Unidade-Id
      canal: X-Canal
      permissoes: X-Permissoes
      sessao-id: X-Sessao-Id
      correlation-id: X-Correlation-Id

    fallback:
      incluir-detalhes: false
      mensagem-padrao: "Serviço temporariamente indisponível. Tente novamente em instantes."

    auditoria:
      habilitado: true

    rate-limit:
      perfis:
        padrao:
          replenish-rate: 20
          burst-capacity: 40
        escrita:
          replenish-rate: 10
          burst-capacity: 20
        autenticacao-login:
          replenish-rate: 5
          burst-capacity: 10
        autenticacao-renovar:
          replenish-rate: 8
          burst-capacity: 16
        autenticacao-esqueci-senha:
          replenish-rate: 3
          burst-capacity: 6

# ==============================================================
# RESILIÊNCIA
# ==============================================================

resilience4j:
  circuitbreaker:
    configs:
      base-config:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        # Apenas falhas de infraestrutura abrem o circuito.
        # 4xx são erros de cliente — não indicam degradação do downstream.
        record-exceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException

    instances:
      celr-autenticacao:
        base-config: base-config
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 10s

      serp-bff:
        base-config: base-config

  timelimiter:
    configs:
      default:
        timeout-duration: 5s
        cancel-running-future: true
    instances:
      celr-autenticacao:
        timeout-duration: 3s
      serp-bff:
        timeout-duration: 5s

# ==============================================================
# MANAGEMENT / OBSERVABILIDADE
# ==============================================================

management:
  server:
    port: ${MANAGEMENT_PORT:8090}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # circuitbreakers      → estado atual das instâncias (CLOSED/OPEN/HALF_OPEN)
        # circuitbreakerevents → histórico de eventos para debug e alerta
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.cloud.gateway.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        spring.cloud.gateway.requests: 0.5, 0.95, 0.99

# ==============================================================
# LOGGING
# ==============================================================

logging:
  level:
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
    org.springframework.web.reactive.function.client: ${LOG_LEVEL_WEBCLIENT:INFO}
    reactor.netty.http.client: ${LOG_LEVEL_NETTY:WARN}
    br.com.celer.gateway: ${LOG_LEVEL_CELER:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"